<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kies de juiste afbeelding v1</title>
  <link rel="stylesheet" href="/shared/ui.css" />
  <style>
    :root {
      --bg: #f5f6f2;
      --ink: #1d211c;
      --muted: #62695f;
      --card: #ffffff;
      --border: #dfe5da;
      --accent: #1f6f5e;
      --accent-soft: #e8f5f1;
      --good: #2f8f46;
      --bad: #b2402f;
      --warn: #a36a16;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Work Sans", "Segoe UI", sans-serif;
    }
    header { padding: 20px 20px 8px; }
    h1 { margin: 0 0 6px; font-size: 24px; }
    .subtitle { color: var(--muted); }
    .wrap { padding: 0 20px 30px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.05);
    }
    .image-grid {
      --columns: 2;
      --columns-small: 2;
      display: grid;
      grid-template-columns: repeat(var(--columns), minmax(0, 1fr));
      gap: 12px;
    }
    .image-option {
      appearance: none;
      width: 100%;
      margin: 0;
      border: 3px solid var(--border);
      border-radius: 12px;
      background: #fff;
      color: inherit;
      padding: 8px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
      text-align: left;
      min-width: 0;
      transition: border-color 120ms ease, box-shadow 120ms ease, background 120ms ease, transform 120ms ease;
    }
    .image-option:hover { border-color: #bac8b8; }
    .image-option:active { transform: translateY(1px); }
    .image-option:focus-visible {
      outline: 3px solid rgba(31, 111, 94, 0.28);
      outline-offset: 2px;
    }
    .image-option:disabled {
      cursor: default;
      opacity: 1;
    }
    .image-option.selected {
      border-color: var(--accent);
      background: var(--accent-soft);
      box-shadow: 0 0 0 2px rgba(31, 111, 94, 0.12);
    }
    .image-option.correct {
      border-color: #86cf98;
      background: #eefaf1;
    }
    .image-option.incorrect {
      border-color: #efa99f;
      background: #fff2ef;
    }
    .image-option img {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #eef0eb;
      background: #f7f8f4;
    }
    .image-option__caption {
      min-height: 1.3em;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }
    .image-option__badge {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      display: none;
      place-items: center;
      background: var(--accent);
      color: #fff;
      border: 2px solid #fff;
      font-weight: 700;
      line-height: 1;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.18);
    }
    .image-option.selected .image-option__badge,
    .image-option.correct .image-option__badge {
      display: grid;
    }
    .image-option.incorrect .image-option__badge { background: var(--bad); }
    .question {
      margin-top: 16px;
      padding: 14px 0 0;
      border-top: 1px solid var(--border);
    }
    .question__text {
      margin: 0;
      font-size: 20px;
      line-height: 1.35;
      font-weight: 650;
      overflow-wrap: anywhere;
    }
    .description {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.45;
    }
    .controls {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    button.primary {
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font: inherit;
    }
    button.primary:disabled {
      cursor: default;
      filter: saturate(0.6);
    }
    .status { color: var(--muted); }
    .status.good { color: var(--good); font-weight: 700; }
    .status.bad { color: var(--bad); font-weight: 700; }
    .error { color: var(--bad); }
    .countdown-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      background: rgba(20, 24, 19, 0.46);
      backdrop-filter: blur(2px);
    }
    .countdown-overlay[hidden] { display: none; }
    .countdown-number {
      width: min(34vw, 190px);
      aspect-ratio: 1;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #fff;
      color: var(--accent);
      border: 6px solid rgba(31, 111, 94, 0.22);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.22);
      font-size: clamp(64px, 14vw, 132px);
      font-weight: 800;
      line-height: 1;
    }
    @media (max-width: 760px) {
      .image-grid {
        grid-template-columns: repeat(var(--columns-small), minmax(0, 1fr));
      }
    }
    @media (max-width: 460px) {
      header { padding-inline: 14px; }
      .wrap { padding-inline: 14px; }
      .card { padding: 12px; }
      .image-grid { grid-template-columns: 1fr; }
      .question__text { font-size: 18px; }
    }
  </style>
</head>
<body>
  <header>
    <h1 id="tool-title">Kies de juiste afbeelding</h1>
    <div id="subtitle" class="subtitle">Laadt data...</div>
  </header>
  <div class="wrap">
    <main class="card">
      <div id="image-grid" class="image-grid" aria-label="Afbeeldingen"></div>
      <section class="question" aria-labelledby="question">
        <p id="question" class="question__text"></p>
        <p id="description" class="description" hidden></p>
      </section>
      <div class="controls">
        <button id="check" type="button" class="primary">Controleer</button>
        <span id="result" class="status" aria-live="polite"></span>
      </div>
      <div id="status" class="status"></div>
    </main>
  </div>
  <div id="countdown" class="countdown-overlay" hidden aria-live="assertive" aria-label="Pauze">
    <div id="countdown-number" class="countdown-number">5</div>
  </div>
  <script src="/shared/completion.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
